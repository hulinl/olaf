name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: olaf
          POSTGRES_PASSWORD: olaf
          POSTGRES_DB: olaf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U olaf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install deps
        working-directory: apps/api
        run: pip install -r requirements.txt
      - name: Lint
        working-directory: apps/api
        run: ruff check .
      - name: Migrate (smoke)
        working-directory: apps/api
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost
          DATABASE_URL: postgres://olaf:olaf@localhost:5432/olaf_test
          REDIS_URL: redis://localhost:6379/0
          EMAIL_HOST: localhost
          EMAIL_PORT: "1025"
        run: python manage.py migrate --noinput
      - name: Test
        working-directory: apps/api
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost
          DATABASE_URL: postgres://olaf:olaf@localhost:5432/olaf_test
          REDIS_URL: redis://localhost:6379/0
          EMAIL_HOST: localhost
          EMAIL_PORT: "1025"
        run: python manage.py test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install deps
        working-directory: apps/web
        run: npm ci
      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
