name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

# Per-PR preview deploys were turned off — they kept failing on
# Microsoft-side flakes and spamming notification mail. Production
# only ships from main, which is what the user actually tests
# against, so the previews weren't earning their cost. CI (build
# + tsc + lint) still runs on PRs via .github/workflows/ci.yml.

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Stamp build version
        # Write the current commit sha to apps/web/public/version.json so
        # the PWA can poll a no-cache static file at runtime and detect
        # when a newer deploy is live. Same sha is also injected as
        # NEXT_PUBLIC_BUILD_SHA below, so the running client knows what
        # build it is and can compare against the live version.json.
        run: |
          mkdir -p apps/web/public
          printf '{"sha":"%s","built_at":"%s"}\n' \
            "${GITHUB_SHA}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > apps/web/public/version.json
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          # Compile-time env vars baked into the Next.js bundle. NEXT_PUBLIC_*
          # ends up in the browser; INTERNAL_API_URL is the server-side fetch
          # target used by SSR pages (public landing, workspace profile).
          NEXT_PUBLIC_API_URL: https://api.olaf.events
          INTERNAL_API_URL: https://api.olaf.events
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BD0AvKIR8VsZjpnVf3uXdklCuTxUcQzRDUoqa0vGoSYhG-dj5YNSGbmYtdx1vibX35G86ejd7Duy6i8LsWPCTFA
          # Build sha is read at runtime via process.env.NEXT_PUBLIC_BUILD_SHA
          # and compared against /version.json so iOS PWA users get a
          # banner when the deployed bundle no longer matches what they're
          # running.
          NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_GROUND_0C0BA5903 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "/apps/web"
          api_location: ""
          output_location: ".next"

