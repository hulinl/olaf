<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="lbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f4"/>
      <stop offset="1" stop-color="#f4f1ea"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#lbBg)"/>
  <!-- Top bar -->
  <rect width="1280" height="56" fill="#fff"/>
  <line x1="0" y1="56" x2="1280" y2="56" stroke="#e5e1d8"/>
  <text x="32" y="34" font-family="system-ui,sans-serif" font-size="14" fill="#737373">Tvůrce / Akce / Spring Camp Beskydy 2026 /</text>
  <text x="445" y="34" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Obsah</text>

  <!-- Sidebar with block menu -->
  <rect x="0" y="56" width="280" height="744" fill="#fff"/>
  <line x1="280" y1="56" x2="280" y2="800" stroke="#e5e1d8"/>
  <text x="32" y="100" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#737373" letter-spacing="1.5">PŘIDAT BLOK</text>
  <g font-family="system-ui,sans-serif" font-size="13" fill="#1a1a1a">
    <g><rect x="20" y="120" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="146">▢ Hero</text></g>
    <g><rect x="20" y="168" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="194">¶ Text</text></g>
    <g><rect x="20" y="216" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="242">▦ Program po dnech</text></g>
    <g><rect x="20" y="264" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="290">▤ Statistiky</text></g>
    <g><rect x="20" y="312" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="338">▣ Co zahrnuje / Co ne</text></g>
    <g><rect x="20" y="360" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="386">▩ Galerie fotek</text></g>
    <g><rect x="20" y="408" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="434">⊕ Mapa</text></g>
    <g><rect x="20" y="456" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="482">? FAQ</text></g>
    <g><rect x="20" y="504" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="530">⊞ Praktické info</text></g>
    <g><rect x="20" y="552" width="240" height="40" rx="8" fill="#faf8f4"/><text x="36" y="578">▣ Gear list</text></g>
  </g>

  <!-- Right canvas with blocks -->
  <g>
    <!-- Block 1: hero (active) -->
    <rect x="320" y="80" width="800" height="180" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <text x="340" y="110" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#f59e0b">HERO · UPRAVIT</text>
    <rect x="340" y="125" width="280" height="14" rx="3" fill="#e5e1d8"/>
    <rect x="340" y="150" width="420" height="22" rx="3" fill="#1a1a1a"/>
    <rect x="340" y="185" width="500" height="14" rx="3" fill="#d4d0c5"/>
    <rect x="340" y="208" width="380" height="14" rx="3" fill="#d4d0c5"/>
    <circle cx="1095" cy="170" r="8" fill="#737373"/>
    <text x="1090" y="174" font-family="system-ui,sans-serif" font-size="13" fill="#fff" text-anchor="middle">⋮</text>

    <!-- Block 2: prose -->
    <rect x="320" y="280" width="800" height="140" rx="12" fill="#fff" stroke="#e5e1d8"/>
    <text x="340" y="310" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#737373">TEXT</text>
    <rect x="340" y="325" width="700" height="12" rx="3" fill="#d4d0c5"/>
    <rect x="340" y="345" width="680" height="12" rx="3" fill="#d4d0c5"/>
    <rect x="340" y="365" width="640" height="12" rx="3" fill="#d4d0c5"/>
    <rect x="340" y="385" width="540" height="12" rx="3" fill="#d4d0c5"/>

    <!-- Block 3: days -->
    <rect x="320" y="440" width="800" height="200" rx="12" fill="#fff" stroke="#e5e1d8"/>
    <text x="340" y="470" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#737373">PROGRAM PO DNECH</text>
    <rect x="340" y="485" width="50" height="50" rx="8" fill="#1a1a1a"/>
    <text x="365" y="517" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">D1</text>
    <rect x="404" y="490" width="320" height="14" rx="3" fill="#1a1a1a"/>
    <rect x="404" y="514" width="400" height="10" rx="3" fill="#d4d0c5"/>
    <rect x="340" y="555" width="50" height="50" rx="8" fill="#1a1a1a"/>
    <text x="365" y="587" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">D2</text>
    <rect x="404" y="560" width="280" height="14" rx="3" fill="#1a1a1a"/>
    <rect x="404" y="584" width="380" height="10" rx="3" fill="#d4d0c5"/>

    <!-- Add block CTA -->
    <rect x="320" y="660" width="800" height="60" rx="12" fill="none" stroke="#d4d0c5" stroke-dasharray="6 4"/>
    <text x="720" y="697" font-family="system-ui,sans-serif" font-size="14" fill="#737373" text-anchor="middle">+ Přidat blok</text>
  </g>
</svg>
