    <g><rect x="60" y="410" width="20" height="20" rx="4" fill="#16a34a"/><text x="70" y="425" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">✓</text><text x="92" y="425" fill="#737373">Pozvánky rozeslat (24. 4.)</text></g>
    <g><rect x="60" y="446" width="20" height="20" rx="4" fill="#16a34a"/><text x="70" y="461" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">✓</text><text x="92" y="461" fill="#737373">Připomenout platbu (8. 5.)</text></g>
    <g><rect x="60" y="482" width="20" height="20" rx="4" fill="#16a34a"/><text x="70" y="497" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">✓</text><text x="92" y="497" fill="#737373">Vybavení připomenout (10. 5.)</text></g>
    <g><rect x="60" y="518" width="20" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="92" y="533" font-weight="600">Briefing před campem (15. 5.) ← dnes</text></g>
    <g><rect x="60" y="554" width="20" height="20" rx="4" fill="none" stroke="#d4d0c5" stroke-width="2"/><text x="92" y="569">Stáhnout final roster (16. 5.)</text></g>
    <g><rect x="60" y="590" width="20" height="20" rx="4" fill="none" stroke="#d4d0c5" stroke-width="2"/><text x="92" y="605">Post-event děkovný mail (20. 5.)</text></g>
  </g>

  <!-- Risk panel -->
  <rect x="840" y="324" width="400" height="440" rx="14" fill="#fff" stroke="#e5e1d8"/>
  <text x="860" y="358" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#737373" letter-spacing="1.5">RISK CHECKLIST</text>
  <text x="860" y="386" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#1a1a1a">11 položek, 6 kategorií</text>
  <g font-family="system-ui,sans-serif" font-size="13" fill="#1a1a1a">
    <text x="860" y="424" fill="#525252">⛅ Počasí</text>
    <text x="1100" y="424" fill="#16a34a" font-size="11" text-anchor="end">2/2 OK</text>
    <line x1="860" y1="442" x2="1220" y2="442" stroke="#f0ede5"/>
    <text x="860" y="468" fill="#525252">🥾 Trasa</text>
    <text x="1100" y="468" fill="#16a34a" font-size="11" text-anchor="end">2/2 OK</text>
    <line x1="860" y1="486" x2="1220" y2="486" stroke="#f0ede5"/>
    <text x="860" y="512" fill="#525252">🎒 Vybavení</text>
    <text x="1100" y="512" fill="#f59e0b" font-size="11" text-anchor="end">1/2 čeká</text>
    <line x1="860" y1="530" x2="1220" y2="530" stroke="#f0ede5"/>
    <text x="860" y="556" fill="#525252">⚕ Zdraví</text>
    <text x="1100" y="556" fill="#16a34a" font-size="11" text-anchor="end">2/2 OK</text>
    <line x1="860" y1="574" x2="1220" y2="574" stroke="#f0ede5"/>
    <text x="860" y="600" fill="#525252">📞 Komunikace</text>
    <text x="1100" y="600" fill="#16a34a" font-size="11" text-anchor="end">1/1 OK</text>
    <line x1="860" y1="618" x2="1220" y2="618" stroke="#f0ede5"/>
    <text x="860" y="644" fill="#525252">🚐 Doprava</text>
    <text x="1100" y="644" fill="#dc2626" font-size="11" text-anchor="end">0/2 čeká</text>
  </g>
