<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs><linearGradient id="cBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#faf8f4"/><stop offset="1" stop-color="#f4f1ea"/></linearGradient></defs>
  <rect width="1280" height="800" fill="url(#cBg)"/>
  <rect width="1280" height="56" fill="#fff"/>
  <line x1="0" y1="56" x2="1280" y2="56" stroke="#e5e1d8"/>
  <text x="32" y="34" font-family="system-ui,sans-serif" font-size="14" fill="#737373">Tvůrce / Akce / Spring Camp 2026</text>

  <!-- Title row -->
  <text x="40" y="110" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f59e0b" letter-spacing="1.5">TVŮRCE</text>
  <text x="40" y="148" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#1a1a1a">Spring Camp Beskydy 2026</text>
  <text x="40" y="172" font-family="system-ui,sans-serif" font-size="13" fill="#737373">16.–19. 5. · Lysá hora · 12 / 16 přihlášených</text>

  <!-- Stats tiles -->
  <g font-family="system-ui,sans-serif">
    <rect x="40" y="200" width="240" height="100" rx="14" fill="#fff" stroke="#e5e1d8"/>
    <text x="60" y="228" font-size="11" font-weight="600" fill="#737373" letter-spacing="1.5">KAPACITA</text>
    <text x="60" y="270" font-size="36" font-weight="700" fill="#1a1a1a">12<tspan font-size="18" fill="#737373" font-weight="400">/16</tspan></text>
    <text x="60" y="290" font-size="11" fill="#737373">4 volná místa</text>

    <rect x="300" y="200" width="240" height="100" rx="14" fill="#fff" stroke="#e5e1d8"/>
    <text x="320" y="228" font-size="11" font-weight="600" fill="#737373" letter-spacing="1.5">ČEKÁ NA SCHVÁLENÍ</text>
    <text x="320" y="270" font-size="36" font-weight="700" fill="#f59e0b">3</text>
    <text x="320" y="290" font-size="11" fill="#737373">vyřiď dnes</text>

    <rect x="560" y="200" width="240" height="100" rx="14" fill="#fff" stroke="#e5e1d8"/>
    <text x="580" y="228" font-size="11" font-weight="600" fill="#737373" letter-spacing="1.5">NEZAPLACENO</text>
    <text x="580" y="270" font-size="36" font-weight="700" fill="#dc2626">7</text>
    <text x="580" y="290" font-size="11" fill="#737373">17 500 Kč celkem</text>

    <rect x="820" y="200" width="240" height="100" rx="14" fill="#fff" stroke="#e5e1d8"/>
    <text x="840" y="228" font-size="11" font-weight="600" fill="#737373" letter-spacing="1.5">DOKUMENTY</text>
    <text x="840" y="270" font-size="36" font-weight="700" fill="#1a1a1a">8<tspan font-size="18" fill="#737373" font-weight="400">/12</tspan></text>
    <text x="840" y="290" font-size="11" fill="#737373">67 % komplet</text>
  </g>

  <!-- Roadmapa -->
  <rect x="40" y="324" width="780" height="440" rx="14" fill="#fff" stroke="#e5e1d8"/>
  <text x="60" y="358" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#737373" letter-spacing="1.5">ROADMAPA</text>
  <text x="60" y="386" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#1a1a1a">Checklist pořadatele</text>

  <g font-family="system-ui,sans-serif" font-size="13" fill="#1a1a1a">
