      <stop offset="0" stop-color="#faf8f4"/>
      <stop offset="1" stop-color="#f4f1ea"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
