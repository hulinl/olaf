<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>olaf — Brand Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #000000;
    --canvas: #ffffff;
    --amber: #ffc719;
    --rule: #dcdcdc;
    --muted: #6b6359;
    --paper: #fafaf7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .mono { font-family: "Geist Mono", ui-monospace, monospace; }
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 88px 80px;
    background: var(--canvas);
    border-bottom: 1px solid var(--rule);
    page-break-after: always;
  }
  .page:last-child { border-bottom: none; }
  .page.amber  { background: var(--amber); color: var(--ink); }
  .page.ink    { background: var(--ink);    color: var(--canvas); }
  .page.ink .muted { color: #999; }
  .page.ink .rule  { border-color: #2a2a2a; }
  .page.ink .label { color: #999; }

  /* Section number + label */
  .section-head {
    display: flex; align-items: baseline; gap: 14px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 56px;
  }
  .page.ink .section-head { border-bottom-color: #2a2a2a; }
  .section-num {
    font-family: "Geist Mono", monospace;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .section-title {
    font-size: 38px; font-weight: 600; letter-spacing: -0.025em;
    margin: 0; line-height: 1;
  }
  .lead {
    font-size: 19px; line-height: 1.55; max-width: 640px;
    color: var(--ink); font-weight: 400;
    letter-spacing: -0.005em;
    margin-bottom: 56px;
  }
  .page.ink .lead { color: #ddd; }
  .body p { font-size: 15px; color: #1a1a1a; max-width: 620px; line-height: 1.6; }
  .page.ink .body p { color: #ccc; }
  .body p + p { margin-top: 16px; }
  .body strong { font-weight: 600; color: var(--ink); }
  .page.ink .body strong { color: #fff; }
  code, .mono { font-size: 0.95em; }
  .body code { background: #f3f1ec; padding: 2px 6px; border-radius: 4px; font-family: "Geist Mono", monospace; font-size: 13px; }
  .page.ink .body code { background: #1f1f1f; color: #ddd; }
  .muted { color: var(--muted); }
  .label {
    font-family: "Geist Mono", monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Cover */
  .cover {
    min-height: 100vh;
    display: flex; flex-direction: column;
    padding: 88px 80px;
    background: var(--canvas);
    position: relative;
  }
  .cover .meta-top {
    display: flex; justify-content: space-between;
    font-family: "Geist Mono", monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .cover .mark-block {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    gap: 28px; align-items: flex-start;
  }
  .cover h1 {
    font-size: 92px; font-weight: 600; letter-spacing: -0.04em;
    margin: 0; line-height: 0.95;
  }
  .cover .subtitle {
    font-size: 22px; color: var(--muted); font-weight: 400;
    letter-spacing: -0.01em; max-width: 540px;
  }
  .cover .meta-bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
    font-family: "Geist Mono", monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .cover .meta-bottom .tag { display: flex; gap: 28px; }

  /* TOC */
  .toc { list-style: none; padding: 0; margin: 0; }
  .toc li {
    display: flex; align-items: baseline; gap: 18px;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 17px;
  }
  .toc li:last-child { border-bottom: none; }
  .toc .n {
    font-family: "Geist Mono", monospace; font-size: 12px;
    color: var(--muted); flex: 0 0 36px;
  }
  .toc .t { flex: 1; font-weight: 500; }
  .toc .pg {
    font-family: "Geist Mono", monospace; font-size: 12px;
    color: var(--muted);
  }

  /* Big hero blocks */
  .hero-mark {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 80px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .hero-mark.dark { background: var(--ink); border-color: transparent; }
  .hero-mark.amber { background: var(--amber); border-color: transparent; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

  .cell {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 36px;
    display: flex; flex-direction: column; align-items: center;
    gap: 14px;
    min-height: 200px;
    justify-content: center;
  }
  .cell.dark { background: var(--ink); border-color: transparent; color: #fff; }
  .cell.amber { background: var(--amber); border-color: transparent; }
  .cell .caption {
    font-family: "Geist Mono", monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
  }
  .cell.dark .caption { color: #888; }
  .cell.amber .caption { color: rgba(0,0,0,0.6); }

  /* Color swatches */
  .palette { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .swatch { border-radius: 6px; overflow: hidden; border: 1px solid var(--rule); }
  .swatch .chip { height: 220px; }
  .swatch .info {
    padding: 18px 20px;
    background: var(--canvas);
    border-top: 1px solid var(--rule);
  }
  .swatch .info .role {
    font-family: "Geist Mono", monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .swatch .info .name { font-weight: 600; font-size: 17px; margin-bottom: 14px; }
  .swatch .info .codes {
    font-family: "Geist Mono", monospace; font-size: 11px;
    color: #1a1a1a; line-height: 1.7;
  }
  .swatch .info .codes span { color: var(--muted); display: inline-block; width: 36px; }

  /* Type spec */
  .type-block { border-top: 1px solid var(--rule); padding: 36px 0; }
  .type-block:first-child { padding-top: 0; border-top: none; }
  .type-block .sample { font-family: "Geist", sans-serif; color: var(--ink); }
  .type-spec {
    display: flex; gap: 36px; margin-top: 16px;
    font-family: "Geist Mono", monospace; font-size: 12px;
    color: var(--muted);
  }
  .type-spec b { color: var(--ink); font-weight: 500; }

  /* Clear space diagram */
  .clearspace {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 60px;
    display: flex; justify-content: center; align-items: center;
  }
  .clearspace .frame {
    position: relative;
    padding: 64px;
    outline: 1px dashed #c4bdb1;
  }
  .clearspace .inner {
    padding: 32px;
    outline: 1px dashed var(--amber);
    display: flex; align-items: center; justify-content: center;
  }
  .clearspace .annotation {
    position: absolute;
    font-family: "Geist Mono", monospace;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* Min-size scale */
  .min-size { display: flex; align-items: flex-end; gap: 36px; padding: 40px 0; flex-wrap: wrap; }
  .min-size .step { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .min-size .step .px {
    font-family: "Geist Mono", monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.1em;
  }

  /* Do/Don't grid */
  .rules { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .rule {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 28px;
  }
  .rule .tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: "Geist Mono", monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 5px 10px; border-radius: 4px;
    margin-bottom: 18px;
  }
  .rule .tag.do { background: var(--amber); color: var(--ink); }
  .rule .tag.dont { background: var(--ink); color: var(--canvas); }
  .rule .visual {
    background: var(--canvas);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 36px;
    display: flex; justify-content: center; align-items: center;
    height: 160px;
    margin-bottom: 14px;
  }
  .rule .visual.dont { position: relative; }
  .rule .visual.dont::after {
    content: '';
    position: absolute; inset: 12px;
    background: linear-gradient(135deg, transparent 49%, rgba(200,30,30,0.5) 49%, rgba(200,30,30,0.5) 51%, transparent 51%);
    pointer-events: none;
  }
  .rule p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* Token table */
  table.tokens {
    width: 100%; border-collapse: collapse;
    font-family: "Geist Mono", monospace; font-size: 13px;
  }
  table.tokens th, table.tokens td {
    text-align: left; padding: 12px 0;
    border-bottom: 1px solid var(--rule);
  }
  table.tokens th {
    font-family: "Geist", sans-serif;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); font-weight: 500;
  }
  table.tokens .chip-mini {
    display: inline-block; width: 14px; height: 14px; border-radius: 3px;
    vertical-align: middle; margin-right: 10px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
  }

  /* Header running across pages */
  .pageframe {
    display: flex; justify-content: space-between;
    font-family: "Geist Mono", monospace; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 56px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .page.ink .pageframe { border-bottom-color: #2a2a2a; color: #777; }

  /* App icon row */
  .icon-row { display: flex; gap: 28px; align-items: flex-end; flex-wrap: wrap; }
  .icon-row .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .icon-row .item .px {
    font-family: "Geist Mono", monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.08em;
  }

  @media print {
    body { background: white; }
    .page, .cover { page-break-after: always; }
  }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="logos.jsx"></script>

<script type="text/babel">

// ─── DON'T variants — for the rules page ─────────────────────────────────
function MarkRotated({ size = 100, tone = 'black' }) {
  return <div style={{ transform: 'rotate(15deg)' }}><MarkB1 size={size} tone={tone} /></div>;
}
function MarkStretched({ size = 100, tone = 'black' }) {
  return <div style={{ transform: 'scaleX(1.4)' }}><MarkB1 size={size} tone={tone} /></div>;
}
function MarkOnGradient({ size = 100 }) {
  return (
    <div style={{ background: 'linear-gradient(135deg, #ff6b6b, #4ecdc4)', padding: 20, borderRadius: 8 }}>
      <MarkB1 size={size} />
    </div>
  );
}
function MarkRecolored({ size = 100 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="44" fill="none" stroke="#e91e63" strokeWidth="6" />
      <circle cx="64" cy="34" r="6.5" fill="#00bcd4" />
      <polyline points="22,68 38,48 47,58 62,38 78,68" fill="none" stroke="#9c27b0" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// ─── Pages ────────────────────────────────────────────────────────────────

function Cover() {
  return (
    <div className="cover">
      <div className="meta-top">
        <span>olaf · brand manual</span>
        <span>v1.0 · 2026-05-16</span>
      </div>
      <div className="mark-block">
        <MarkB1 size={180} />
        <h1>olaf<span style={{color:'var(--amber)'}}>.</span></h1>
        <div className="subtitle">A community-and-event platform for adventure organisers, sports communities, and corporate hosts.</div>
      </div>
      <div className="meta-bottom">
        <div className="tag">
          <span>brand v1</span>
          <span>internal</span>
        </div>
        <span>where adventures begin</span>
      </div>
    </div>
  );
}

function TOC() {
  return (
    <div className="page">
      <div className="pageframe"><span>olaf · brand manual · v1.0</span><span>02 — contents</span></div>
      <div className="section-head">
        <div>
          <div className="section-num">00 / Contents</div>
          <h2 className="section-title">What's in here</h2>
        </div>
      </div>
      <ol className="toc">
        <li><span className="n">01</span><span className="t">Brand essence</span><span className="pg">p. 04</span></li>
        <li><span className="n">02</span><span className="t">The mark</span><span className="pg">p. 05</span></li>
        <li><span className="n">03</span><span className="t">Construction & geometry</span><span className="pg">p. 06</span></li>
        <li><span className="n">04</span><span className="t">Clear space & minimum size</span><span className="pg">p. 07</span></li>
        <li><span className="n">05</span><span className="t">Lockups</span><span className="pg">p. 08</span></li>
        <li><span className="n">06</span><span className="t">Colour</span><span className="pg">p. 09</span></li>
        <li><span className="n">07</span><span className="t">Typography</span><span className="pg">p. 10</span></li>
        <li><span className="n">08</span><span className="t">App icon & favicon</span><span className="pg">p. 11</span></li>
        <li><span className="n">09</span><span className="t">Surface states</span><span className="pg">p. 12</span></li>
        <li><span className="n">10</span><span className="t">Do's & don'ts</span><span className="pg">p. 13</span></li>
        <li><span className="n">11</span><span className="t">Voice</span><span className="pg">p. 14</span></li>
        <li><span className="n">12</span><span className="t">Design tokens</span><span className="pg">p. 15</span></li>
      </ol>
    </div>
  );
}

function Essence() {
  return (
    <div className="page">
      <div className="pageframe"><span>olaf · brand manual · v1.0</span><span>01 — essence</span></div>
      <div className="section-head">
        <div>
          <div className="section-num">01 / Essence</div>
          <h2 className="section-title">What olaf is</h2>
        </div>
      </div>
      <p className="lead">olaf is one place to plan a journey and live it together — communities, events, gear lists, GPX, waivers, reminders, all in a tool small enough to feel personal.</p>
      <div className="body" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48 }}>
        <div>
          <div className="label">Promise</div>
          <p>Great events happen when a tight-knit crew shares both the planning <em>and</em> the journey. olaf gives organisers one trusted tool, and members one place to be ready.</p>
        </div>
        <div>
          <div className="label">Tone</div>
          <p>Calm. Practical. Hand-built. We are not a marketing platform; we are the kit you check before you leave the trailhead. Quiet competence beats noisy enthusiasm.</p>
        </div>
        <div>
          <div className="label">Heritage</div>
          <p>olaf is the platform that grew from <strong>Olaf Adventures</strong> — an outdoor community built around real treks, not spreadsheets. The mark carries that origin forward.</p>
        </div>
        <div>
          <div className="label">Tagline</div>
          <p style={{ fontSize: 19, fontWeight: 500, color: 'var(--ink)' }}>Where adventures begin.</p>
        </div>
      </div>
    </div>
  );
}

function MarkPage() {
  return (
    <div className="page">
      <div className="pageframe"><span>olaf · brand manual · v1.0</span><span>02 — the mark</span></div>
      <div className="section-head">
        <div>
          <div className="section-num">02 / The mark</div>
          <h2 className="section-title">A sunrise over the peak</h2>
        </div>
      </div>
      <p className="lead">A sharp two-peak horizon inside an open circle, with an amber sun cresting over the higher peak. The literal reading of <em>where adventures begin</em>.</p>
      <div className="hero-mark"><MarkB1 size={360} /></div>
      <div className="body" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, marginTop: 32 }}>
        <div>
          <div className="label">What it says</div>
          <p>The <strong>open ring</strong> is a window — not a wall. olaf is invite-warm, not gated. The <strong>peaks</strong> are the journey ahead. The <strong>amber sun</strong> is the moment a trip turns from plan into kit-on-your-back. Together: dawn, in one symbol.</p>
        </div>
        <div>
          <div className="label">How it behaves</div>
          <p>The mark is geometric, not illustrative. It is built from one circle, one polyline, and one filled dot — no gradients, no textures, no rendered light. It must read at <strong>16 px</strong> as crisply as at 360 px.</p>
        </div>
      </div>
    </div>
  );
}

function Construction() {
  return (
    <div className="page">
      <div className="pageframe"><span>olaf · brand manual · v1.0</span><span>03 — construction</span></div>
      <div className="section-head">
        <div>
          <div className="section-num">03 / Construction</div>
          <h2 className="section-title">Geometry</h2>
        </div>
      </div>
      <p className="lead">The mark lives in a 100×100 grid. Every element is locked to that grid so the symbol stays consistent at any rendered size.</p>
      <div className="grid-2" style={{ alignItems: 'stretch' }}>
        <div className="cell" style={{ padding: 50 }}>
          <ConstructionDiagram />
          <div className="caption">100 × 100 grid · ring r=44 · stroke 6</div>
        </div>
        <div style={{ padding: '0 8px' }}>
          <div className="label">Specifications</div>
          <table className="tokens">
            <tbody>
              <tr><th>Element</th><th>Value</th></tr>
              <tr><td>Canvas</td><td>100 × 100</td></tr>
              <tr><td>Ring centre</td><td>(50, 50)</td></tr>
              <tr><td>Ring radius</td><td>44</td></tr>
              <tr><td>Stroke width</td><td>6</td></tr>
              <tr><td>Stroke caps</td><td>round, round join</td></tr>
              <tr><td>Sun centre</td><td>(64, 34)</td></tr>
              <tr><td>Sun radius</td><td>6.5</td></tr>
              <tr><td>Peak path</td><td>22,68 → 38,48 → 47,58 → 62,38 → 78,68</td></tr>
            </tbody>
          </table>
          <p className="muted" style={{ fontSize: 12, marginTop: 24, lineHeight: 1.6 }}>
            The mark must always be redrawn from these coordinates — never warped or re-traced from a raster. Source SVG ships at <code style={{background:'#f3f1ec',padding:'1px 5px',borderRadius:3,fontFamily:'Geist Mono, monospace'}}>apps/web/components/ui/logo.tsx</code>.
          </p>
        </div>
      </div>
    </div>
  );
}

function ConstructionDiagram() {
  return (
    <svg width="320" height="320" viewBox="0 0 100 100">
      {/* grid */}
      <defs>
        <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
          <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#dcdcdc" strokeWidth="0.25" />
        </pattern>
      </defs>
      <rect width="100" height="100" fill="url(#grid)" />
      {/* construction guides */}
      <circle cx="50" cy="50" r="44" fill="none" stroke="#dcdcdc" strokeWidth="0.4" strokeDasharray="1 1" />
      <line x1="50" y1="0" x2="50" y2="100" stroke="#dcdcdc" strokeWidth="0.4" strokeDasharray="1 1" />
      <line x1="0" y1="50" x2="100" y2="50" stroke="#dcdcdc" strokeWidth="0.4" strokeDasharray="1 1" />
      {/* the mark itself */}
      <circle cx="50" cy="50" r="44" fill="none" stroke="#000" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx="64" cy="34" r="6.5" fill="#ffc719" />
      <polyline points="22,68 38,48 47,58 62,38 78,68" fill="none" stroke="#000" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
      {/* annotation dots */}
      <circle cx="64" cy="34" r="0.8" fill="#c81e1e" />
      <circle cx="50" cy="50" r="0.8" fill="#c81e1e" />
    </svg>
  );
}

function ClearSpace() {
  return (
    <div className="page">
      <div className="pageframe"><span>olaf · brand manual · v1.0</span><span>04 — clear space</span></div>
      <div className="section-head">
        <div>
          <div className="section-num">04 / Clear space & minimum size</div>
          <h2 className="section-title">Breathing room</h2>
        </div>
      </div>
      <p className="lead">Reserve a margin equal to <strong>one quarter of the ring diameter</strong> on all sides of the mark. Nothing — text, other logos, photographic edges — enters that zone.</p>

      <div className="grid-2" style={{ alignItems: 'stretch', marginBottom: 56 }}>
        <div className="clearspace">
